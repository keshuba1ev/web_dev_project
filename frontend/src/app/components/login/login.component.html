<div class="login-page">
  <div class="login-glass glass-panel">
    <div class="login-header">
      <h2>Dorama Catalog</h2>
      <p>Sign in to continue</p>
    </div>
    
    @if (errorMessage) {
      <div class="error-msg">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" [(ngModel)]="credentials.username" placeholder="Enter your username" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" [(ngModel)]="credentials.password" placeholder="Enter your password" required>
        </div>
      </div>
      
      <button type="submit" class="btn-submit" (click)="onSubmit()">Sign In</button>
    </form>
  </div>
</div>
